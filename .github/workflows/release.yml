name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build all targets
        run: |
          declare -a targets=(
            "x86_64-linux"
            "aarch64-linux"
            "x86_64-macos"
            "aarch64-macos"
            "x86_64-windows"
          )
          for target in "${targets[@]}"; do
            echo "Building $target..."
            zig build -Dtarget=$target -Doptimize=ReleaseSmall --prefix zig-out/$target
          done

      - name: Package archives
        run: |
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"

          for target in x86_64-linux aarch64-linux x86_64-macos aarch64-macos; do
            tar -czf "dist/zipstream-${tag}-${target}.tar.gz" -C "zig-out/${target}/bin" zipstream
          done

          zip -j "dist/zipstream-${tag}-x86_64-windows.zip" "zig-out/x86_64-windows/bin/zipstream.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
